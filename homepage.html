<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MAHAL</title>

    <link rel="stylesheet" href="homepage_style.css" />
    <link rel="stylesheet" href="homepage_script.js" />
    <!-- Navbar -->
    <link rel="stylesheet" href="header.css" />
  </head>

  <body>
    <header class="main-header">
      <h1>MAHAL</h1>
      <nav>
        <a href="homepage.html">Home</a>
        <a href="Memories.html">Memories</a>
        <a href="Occasions/Event.html">Events</a>
        <a href="#">About Us</a>

    <!-- Hero Section -->
    <div class="hero">
      <div>
        <h2>Our Story</h2>
        <p>Every moment, every memory, all in one place ❤️</p>
        <a href="Occasions/Event.html" class="btn">View Memories</a>
      </div>
    </div>

    <!-- Memory Gallery Preview -->
    <section class="gallery">
      <h2>Recent Memories 📸</h2>

      <div class="gallery-container">
        <img src="Estratto/img0.jpg" alt="Memory" />

    <section class="events">
      <h2>Special Events</h2>
      <p>From birthdays to simple days, every moment matters.</p>

    <!-- Footer -->
    <footer>
